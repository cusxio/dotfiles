setw -g window-status-format "#[bg=terminal]#{?window_activity_flag,#{?window_bell_flag,#[fg=brightred]▲,#[fg=#504945] #I:#{?#{m:*sh,#{pane_current_command}},#{b:pane_current_path},#{b:pane_current_path} (#{pane_current_command})}},#[fg=#504945] #I:#{?#{m:*sh,#{pane_current_command}},#{b:pane_current_path},#{b:pane_current_path} (#{pane_current_command})}}#[bg=terminal]"

