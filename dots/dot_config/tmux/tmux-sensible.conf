unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display " Reloaded! "
bind C-q confirm-before 'kill-session'

setw -g monitor-activity on

set -g message-style bg=terminal,fg=brightred
set -g message-command-style bg=black,fg=blue

set -g display-time 4000
set -s escape-time 0
set -g focus-events on
set -g history-limit 100000
set -g status-interval 5

# improve usability
set -g mouse on
setw -g mode-keys vi

bind c copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# This is required to handle cursor cursor on VimLeave
# https://neovim.io/doc/user/tui.html#tui-cursor-tmux
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# https://github.com/dmmulroy/.dotfiles/blob/734d7a61bfed421b3ef26841d3ef3999971811af/home/.config/tmux/tmux.conf
set -s extended-keys always
set -s extended-keys-format csi-u

set -s terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:extkeys'
set -as terminal-features 'screen*:title'
set -as terminal-features 'rxvt*:ignorefkeys'
